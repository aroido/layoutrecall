name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish, for example v0.1.1
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify-release:
    runs-on: macos-15
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Validate release inputs
        run: ./scripts/release-preflight.sh "$RELEASE_TAG" --skip-secrets

      - name: Run full verification
        run: ./scripts/run-ai-verify --mode full

  build-macos-release:
    needs: verify-release
    runs-on: macos-15
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Validate release secrets
        run: ./scripts/release-preflight.sh "$RELEASE_TAG"

      - name: Build signed release assets
        run: |
          version="${RELEASE_TAG#v}"
          VERSION="$version" BUILD_NUMBER="${GITHUB_RUN_NUMBER}" ./scripts/build-release-archive

      - name: Detect prerelease tag
        id: release_meta
        run: |
          if [[ "${RELEASE_TAG}" =~ -(alpha|beta|rc)\.[0-9]+$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_title="LayoutRecall ${RELEASE_TAG}"
          prerelease_args=()
          if [ "${{ steps.release_meta.outputs.prerelease }}" = "true" ]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/releases/* \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${RELEASE_TAG}" dist/releases/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${release_title}" \
              --target "${GITHUB_SHA}" \
              --generate-notes \
              "${prerelease_args[@]}"
          fi

      - name: Upload release assets
        uses: actions/upload-artifact@v6
        with:
          name: release-assets-${{ env.RELEASE_TAG }}
          path: dist/releases/*
          retention-days: 14

  sync-homebrew-tap:
    needs: build-macos-release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      HOMEBREW_TAP_REPO: aroido/homebrew-layoutrecall
      HOMEBREW_TAP_PATH: Casks/layoutrecall.rb
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Validate Homebrew tap token
        run: |
          if [ -z "${HOMEBREW_TAP_GITHUB_TOKEN}" ]; then
            echo "Missing HOMEBREW_TAP_GITHUB_TOKEN."
            exit 1
          fi

      - name: Sync Homebrew tap
        run: |
          python3 scripts/sync-homebrew-tap.py \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${RELEASE_TAG}" \
            --tap-repo "${HOMEBREW_TAP_REPO}" \
            --tap-path "${HOMEBREW_TAP_PATH}" \
            --token "${HOMEBREW_TAP_GITHUB_TOKEN}"
